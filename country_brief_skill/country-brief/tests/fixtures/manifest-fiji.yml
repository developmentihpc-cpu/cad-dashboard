# Fiji country brief manifest
# Context: Pacific climate + Indo-Pacific geopolitics + post-Bainimarama political transition
# Bilateral lens: UAE — climate-mediated (COP28 legacy, SIDS diplomacy); thin direct economic ties
# Module selection: standard spine + climate/humanitarian + diaspora + infrastructure + comparative

country: Fiji
home_country: UAE
brief_type: pacific-climate-geopolitical

modules:
